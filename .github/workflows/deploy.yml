# team1-chatguard-app/.github/workflows/deploy.yml
#
# 배포 컨베이어 ①~⑤ (CLAUDE.md §7, DESIGN.md E-2 #3):
#   main push → 이미지 3개 빌드(태그 = git SHA) → OIDC로 AWS 인증 → ECR push
#   → config 레포 overlays/dev 이미지 태그를 새 SHA로 커밋
# PR 검증은 ci.yml 담당(이 파일과 별개). ⑥ 클러스터 반영은 ArgoCD가 config를 보고 수행.
#
# 사전 조건:
#   - infra apply: ECR 3개 + OIDC Provider + role (env의 ★ 값 확인)
#   - app 레포 Secret `CONFIG_REPO_TOKEN`: fine-grained PAT
#     (대상: team1-chatguard-config 한정 / 권한: Contents RW, Metadata R / 만료일 설정)

name: Deploy

on:
  push:
    branches: [main]

# 연속 머지 시 실행을 "대기 직렬화"한다 (cancel-in-progress: false).
# 취소하면 앞선 머지의 배포가 증발하고, 동시 실행하면 config push가 충돌한다.
concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # OIDC 토큰 발급 허가 — 이것이 없으면 AssumeRole 불가

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 495599735720.dkr.ecr.ap-northeast-2.amazonaws.com
  # ★ infra apply 후 실제 role 이름과 일치하는지 확인
  AWS_ROLE_ARN: arn:aws:iam::495599735720:role/team1-gha-app-dev-role

jobs:
  build-push:
    name: build+push (${{ matrix.component }})
    runs-on: ubuntu-latest
    strategy:
      # 한 컴포넌트가 실패해도 나머지는 끝까지 빌드 — 실패 원인 파악이 빠르다.
      # (update-config는 needs로 막히므로 반쪽 배포는 발생하지 않는다)
      fail-fast: false
      matrix:
        include:
          # ★ ecr_repo 는 infra의 ECR 이름과 글자 단위 일치해야 한다 (team1-dev- prefix, §2)
          - component: backend
            ecr_repo: team1-dev-api-server
          - component: moderation-worker
            ecr_repo: team1-dev-ai-worker
          - component: frontend
            ecr_repo: team1-dev-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push (tag = git SHA)
        run: |
          IMAGE="${ECR_REGISTRY}/${{ matrix.ecr_repo }}:${GITHUB_SHA}"
          docker build -t "${IMAGE}" "${{ matrix.component }}/"
          docker push "${IMAGE}"

  update-config:
    name: bump overlays/dev image tags
    needs: build-push # 세 이미지 전부 push 성공한 뒤에만 — 반쪽 배포 방지
    runs-on: ubuntu-latest
    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          repository: CLD-05/team1-chatguard-config
          token: ${{ secrets.CONFIG_REPO_TOKEN }}

      # kustomize는 ubuntu-latest 러너에 기본 설치돼 있다.
      # "이미지이름:태그" 형식 — 이름(= ECR 레포 URL)이 매니페스트의 image: 와 일치하는
      # 항목의 태그만 바꾼다. config 레포(3단계)는 이 이름을 그대로 써야 한다(인터페이스).
      - name: Set image tags
        working-directory: overlays/dev
        run: |
          kustomize edit set image \
            "${ECR_REGISTRY}/team1-dev-api-server:${GITHUB_SHA}" \
            "${ECR_REGISTRY}/team1-dev-ai-worker:${GITHUB_SHA}" \
            "${ECR_REGISTRY}/team1-dev-frontend:${GITHUB_SHA}"
        env:
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}

      - name: Commit & push
        run: |
          git config user.name  "team1-deploy-bot"
          git config user.email "github-actions@users.noreply.github.com"
          git add overlays/dev/kustomization.yaml
          # 변경이 없으면(동일 SHA 재실행 등) 조용히 종료
          git diff --cached --quiet && { echo "no changes"; exit 0; }
          git commit -m "deploy(dev): app@${GITHUB_SHA::7}"
          git push
