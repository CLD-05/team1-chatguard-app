# team1-chatguard-app/.github/workflows/ci.yml
#
# PR 검증 CI — backend / frontend / moderation-worker 를 각각 빌드·검사한다.
# (AUDIT 관찰 #2, CLAUDE.md §7: "CI: PR=build+test+lint")
#
# 트리거: pull_request 만. ECR push·config 이미지 태그 갱신(main merge 파이프라인)은
#         이 워크플로에 포함하지 않는다(별도 워크플로로 분리).
# claude-review.yml(수동 리뷰 봇)과는 독립적으로 동작한다.

name: CI

on:
  pull_request:

# 같은 PR에 새 푸시가 오면 진행 중인 실행을 취소해 러너 낭비를 줄인다.
concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: backend (maven build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # contextLoads(@SpringBootTest)는 MySQL·Redis 연결을 필요로 한다.
    # 앱 기본값(localhost:3306/chatguard_dev, root/비번없음, redis localhost:6379)에 맞춰 서비스를 띄운다.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: chatguard_dev
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build + test
        run: ./mvnw -B clean verify

  frontend:
    name: frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  moderation-worker:
    name: moderation-worker (deps + syntax check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: moderation-worker
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: moderation-worker/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Test
        run: pytest -q

  notify:
    name: Slack 알림
    needs: [backend, frontend, moderation-worker]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@37ebaef184d7626c5f204ab8d3baff4262dd30f0  # v1.27.0
        with:
          payload: |
            {
              "text": "${{ (needs.backend.result == 'success' && needs.frontend.result == 'success' && needs['moderation-worker'].result == 'success') && '✅' || '❌' }} *[CI] ${{ github.repository }}*\nPR: ${{ github.event.pull_request.title }}\n작업자: ${{ github.actor }}\n결과: backend=${{ needs.backend.result }} / frontend=${{ needs.frontend.result }} / worker=${{ needs['moderation-worker'].result }}\n링크: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_CI_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
