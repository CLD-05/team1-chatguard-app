version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: chatguard-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: chatguard_dev
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.0-alpine
    container_name: chatguard-redis
    ports:
      - "6379:6379"