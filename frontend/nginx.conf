server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API 요청을 chat-server로 프록시 (클러스터 내 Service 이름)
    location /api/ {
        proxy_pass http://chat-server:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket 프록시 (Upgrade 헤더 + 장시간 유지를 위한 timeout)
    location /ws/ {
        proxy_pass http://chat-server:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;   # 채팅 WebSocket 장시간 유지(기본 60s면 1분 후 끊김)
        proxy_send_timeout 3600s;
    }

    # React Router 대응 — 나머지는 index.html로
    location / {
        try_files $uri $uri/ /index.html;
    }
}